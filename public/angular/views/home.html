<style>
    /* ====== Modern Home Page Design ====== */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #f4f6ff 0%, #f8fbff 100%);
  color: #1f2937;
}

.container {
  max-width: 900px;
  margin: 70px auto;
  padding: 40px 30px;
  background: rgba(255, 255, 255, 0.85);
  border-radius: 22px;
  box-shadow: 0 18px 60px rgba(20, 25, 50, 0.12);
  border: 1px solid rgba(150, 170, 210, 0.25);
  backdrop-filter: blur(10px);
}

.container h1 {
  font-size: 44px;
  font-weight: 800;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}

.container p {
  font-size: 18px;
  color: #4b5563;
  line-height: 1.7;
  margin-top: 0;
}

/* Decorative line */
.container::before {
  content: "";
  display: block;
  width: 70px;
  height: 4px;
  background: linear-gradient(90deg, #2563eb, #7c3aed);
  border-radius: 999px;
  margin-bottom: 20px;
}

/* About Us link style */
.about-link {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 18px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  color: #2563eb;
  border: 1px solid rgba(37, 99, 235, 0.35);
  transition: all 0.3s ease;
}

.about-link:hover {
  background: rgba(37, 99, 235, 0.08);
  transform: translateY(-2px);
}

/* Responsive */
@media (max-width: 768px) {
  .container {
    margin: 40px 20px;
    padding: 30px 20px;
  }

  .container h1 {
    font-size: 34px;
  }

  .container p {
    font-size: 16px;
  }
}
</style>

<div class="container">
    <h1>Welcome</h1>
    <p>This is SEO Home Page</p>

    <!-- About Us Link -->
    <a href="/about-us" class="about-link">Go to About Us</a>
</div>
